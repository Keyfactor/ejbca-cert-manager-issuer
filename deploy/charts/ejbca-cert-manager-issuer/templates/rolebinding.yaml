apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "ejbca-cert-manager-issuer.labels" . | nindent 4 }}
  name: {{ include "ejbca-cert-manager-issuer.name" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ejbca-cert-manager-issuer.name" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "ejbca-cert-manager-issuer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if .Values.secretConfig.useClusterRoleForConfigMapAccess }}ClusterRoleBinding{{ else }}RoleBinding{{ end }}
metadata:
  labels:
    {{- include "ejbca-cert-manager-issuer.labels" . | nindent 4 }}
  name: {{ include "ejbca-cert-manager-issuer.name" . }}-configmap-reader-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ if .Values.secretConfig.useClusterRoleForConfigMapAccess }}ClusterRole{{ else }}Role{{ end }}
  name: {{ include "ejbca-cert-manager-issuer.name" . }}-configmap-reader-role
subjects:
  - kind: ServiceAccount
    name: {{ include "ejbca-cert-manager-issuer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}